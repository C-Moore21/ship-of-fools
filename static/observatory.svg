<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#080c14" stroke="#e8332a" stroke-width="2.5"/>

  <!-- Telescope assembly drawn horizontal, rotated -40deg around (50,50) -->
  <g transform="rotate(-40 50 50)">
    <!-- Eyepiece (narrow left end) -->
    <rect x="9"  y="46" width="12" height="8" rx="1.5" fill="#f0f4ff"/>
    <!-- Step connector -->
    <rect x="19" y="44" width="7"  height="12" rx="1" fill="#f0f4ff"/>
    <!-- Main tube -->
    <rect x="24" y="43" width="26" height="14" rx="2" fill="#f0f4ff"/>
    <!-- Objective bell (wide right end) -->
    <rect x="48" y="39" width="20" height="22" rx="2" fill="#f0f4ff"/>
    <!-- Mount bracket below tube center -->
    <rect x="33" y="57" width="12" height="9"  rx="1" fill="#f0f4ff"/>
    <rect x="30" y="55" width="18" height="4"  rx="1" fill="#f0f4ff"/>
  </g>

  <!-- Tripod legs — origin ~(49, 66) after rotation -->
  <line x1="49" y1="66" x2="31" y2="89" stroke="#f0f4ff" stroke-width="4" stroke-linecap="round"/>
  <line x1="49" y1="66" x2="49" y2="91" stroke="#f0f4ff" stroke-width="4" stroke-linecap="round"/>
  <line x1="49" y1="66" x2="67" y2="89" stroke="#f0f4ff" stroke-width="4" stroke-linecap="round"/>

  <!-- Crescent moon — upper left -->
  <circle cx="21" cy="23" r="10" fill="#f0f4ff"/>
  <circle cx="25" cy="20" r="9"  fill="#080c14"/>

  <!-- Large 4-pointed sparkle — upper right -->
  <path d="M73 16 L75.5 23 L82 25.5 L75.5 28 L73 35 L70.5 28 L64 25.5 L70.5 23 Z" fill="#f0f4ff"/>
  <!-- Medium sparkle — right mid -->
  <path d="M83 45 L84.5 49 L88.5 50.5 L84.5 52 L83 56 L81.5 52 L77.5 50.5 L81.5 49 Z" fill="#f0f4ff"/>
  <!-- Small sparkle — upper mid -->
  <path d="M60 9 L61 12 L64 13 L61 14 L60 17 L59 14 L56 13 L59 12 Z" fill="#f0f4ff"/>

  <!-- Dot stars -->
  <circle cx="36" cy="11" r="2.2" fill="#f0f4ff"/>
  <circle cx="83" cy="31" r="1.6" fill="#f0f4ff"/>
  <circle cx="79" cy="63" r="1.8" fill="#f0f4ff"/>
  <circle cx="44" cy="7"  r="1.4" fill="#f0f4ff"/>
  <circle cx="88" cy="70" r="1.2" fill="#f0f4ff"/>
</svg>
